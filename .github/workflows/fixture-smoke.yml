name: Fixture Smoke

on:
  workflow_dispatch:

jobs:
  fixture-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fixture smoke
        run: python -m unittest tests.test_syncwheel.SyncwheelFixtureTest.test_materialize_commands_are_emitted -v
